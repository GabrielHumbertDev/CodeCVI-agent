services:
  # Infrastructure
  db:
    image: postgres:15
    container_name: cv_platform_db
    environment:
      POSTGRES_USER: cvuser
      POSTGRES_PASSWORD: cvpassword
      POSTGRES_DB: cv_platform
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cvuser -d cv_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cv_platform_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ollama model server
  ollama:
    image: ollama/ollama:latest
    container_name: cv_platform_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12

  ollama_init:
    image: ollama/ollama:latest
    container_name: cv_platform_ollama_init
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "ollama pull qwen2.5:7b &&
       ollama pull nomic-embed-text"
    restart: "no"

  # AI Service
  ai_service:
    build: ./ai_service
    container_name: cv_platform_ai
    ports:
      - "8001:8001"
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:7b
    depends_on:
      ollama_init:
        condition: service_completed_successfully

  # Backend API
  backend:
    build: ./backend
    container_name: cv_platform_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://cvuser:cvpassword@db:5432/cv_platform
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me-before-deploy-use-openssl-rand-hex-32
      AI_SERVICE_URL: http://ai_service:8001
      AI_PROVIDER: local
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:7b
      EMBEDDING_MODEL: nomic-embed-text
      BACKEND_CORS_ORIGINS: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai_service:
        condition: service_started
    volumes:
      - ./backend/uploads:/app/uploads

  # Frontend
  frontend:
    build: ./frontend
    container_name: cv_platform_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  ollama_data:
